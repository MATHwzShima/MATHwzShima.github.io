<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Login - Mrs. Shimaa</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Comic Neue', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      background: #fff; border-radius: 32px; padding: 48px 40px;
      width: 400px; max-width: 90vw; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .lock-icon { font-size: 3em; margin-bottom: 10px; }
    h1 { font-family: 'Fredoka One',cursive; font-size: 1.5em; color: #667eea; margin-bottom: 6px; }
    p { color: #888; margin-bottom: 20px; }
    input {
      width: 100%; padding: 14px 18px; border: 3px solid #e0e0e0; border-radius: 14px;
      font-size: 1.1em; font-family: 'Comic Neue', sans-serif; outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: #667eea; }
    button {
      margin-top: 14px; width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none;
      border-radius: 14px; font-family: 'Fredoka One',cursive; font-size: 1.2em;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
    .error { color: #ef4444; font-weight: 700; margin-top: 10px; min-height: 24px; }
    .note { font-size: 0.85em; color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="lock-icon">&#128274;</div>
    <h1>Teacher Dashboard</h1>
    <p>Enter your password to view student submissions</p>
    <input type="password" id="loginPassword" placeholder="Enter password..." autocomplete="off">
    <button onclick="login()">Open Dashboard</button>
    <div id="loginError" class="error"></div>
    <div class="note">You'll be redirected to the secure dashboard</div>
  </div>

  <script>
    const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbz4fJ2O7taTMrGY6jzmCZlorLJWZSg6tyScofMUC8JinqctirT_ae3s1bx126p1LGOh/exec';

    function login() {
      const pw = document.getElementById('loginPassword').value;
      if (!pw) { document.getElementById('loginError').textContent = 'Please enter a password'; return; }
      document.getElementById('loginError').textContent = '';
      window.location.href = WEBHOOK_URL + '?key=' + encodeURIComponent(pw);
    }

    document.getElementById('loginPassword').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
